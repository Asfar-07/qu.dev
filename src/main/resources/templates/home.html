<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>qu.dev – Survey Builder</title>
<link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/home.css">
</head>
<body>
<div class="hero-bg"></div>
<div class="grid-overlay"></div>

<div class="hero">
  <div class="badge">
    <span class="badge-dot"></span>
    v1.0 · Survey Builder Platform
  </div>

  <h1>Make it easy to add<br/><em>questions in project</em><br/>through qu.dev</h1>

  <p>Build, manage, and integrate survey questions directly into your project with a clean API and intuitive builder.</p>

  <div class="hero-actions">
    <button class="btn-hero-primary" onclick="window.location.href='/connection'">
      → Start Building
    </button>
    <button class="btn-hero-secondary" onclick="window.location.href='/connection'">
      Learn more
    </button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-number">12+</div>
      <div class="stat-label">Question Types</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <div class="stat-number">API</div>
      <div class="stat-label">Ready</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <div class="stat-number">∞</div>
      <div class="stat-label">Surveys</div>
    </div>
  </div>
</div>

</html>
